<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risultato</title>
  <script>
    window.onload = function () {
      // Prendi il punteggio dalla sessione di memoria
      const score = localStorage.getItem('score');
      document.getElementById('correct-answers').textContent = score;

      let comment = '';
      if (score >= 7) {
        comment = 'Grande lavoro! Sei un esperto di AI!';
      } else if (score >= 5) {
        comment = 'Non male, ma puoi fare meglio!';
      } else {
        comment = 'Ci vuole ancora un po\' di pratica!';
      }
      document.getElementById('comment').textContent = comment;
    };
  </script>
</head>
<body style="background-image: url('https://img.freepik.com/foto-gratuito/concetto-di-trasformazione-digitale-del-fondo-del-cervello-della-tecnologia-ai_53876-124672.jpg'); background-size: cover; text-align: center; color: white; padding: 50px;">
  <h1>Il Tuo Risultato</h1>
  <p>Hai dato <span id="correct-answers"></span> risposte giuste!</p>
  <p id="comment"></p>
  <a href="game.html" style="color: white; background-color: green; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Riprova</a>
</body>
</html>
